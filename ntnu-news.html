<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>師大新聞曝光</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Noto Sans TC", sans-serif;
}

body {
  background: linear-gradient(to right, #ffffff, #f5f5f5);
}

/* 主區塊 */
.section {
  display: flex;
  height: 100vh;
  align-items: center;
  padding: 60px;
  gap: 40px;
}

/* 左側文字 */
.left {
  width: 20%;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.left h2 {
  font-size: 22px;
  margin-bottom: 20px;
}

.left p {
  font-size: 14px;
  line-height: 1.8;
}

.highlight {
  margin-top: 20px;
  padding-left: 10px;
  border-left: 3px solid #000;
}

/* 右側 */
.right {
  width: 80%;
}

.title {
  font-size: 42px;
  font-weight: 700;
  margin-bottom: 40px;
}

/* Carousel */
.carousel {
  display: flex;
  gap: 24px;
  overflow-x: auto;
  padding-bottom: 20px;
  scroll-behavior: smooth;
  cursor: grab;
}

.carousel::-webkit-scrollbar {
  height: 6px;
}
.carousel::-webkit-scrollbar-thumb {
  background: #888;
  border-radius: 10px;
}

/* 卡片 */
.card {
  min-width: 280px;
  background: white;
  border-radius: 20px;
  overflow: hidden;
  flex-shrink: 0;
  box-shadow: 0 8px 20px rgba(0,0,0,0.08);
  transition: 0.3s;
  text-decoration: none;
  color: black;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 20px 40px rgba(0,0,0,0.15);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 18px;
  font-size: 15px;
  line-height: 1.6;
}

/* 回到作品集 */
.back-section {
  text-align: center;
  margin-top: 40px;
}

.back-btn {
  display: inline-block;
  padding: 12px 28px;
  border: 1px solid black;
  border-radius: 30px;
  text-decoration: none;
  color: black;
  transition: 0.3s;
}

.back-btn:hover {
  background: black;
  color: white;
}

/* RWD */
@media (max-width: 768px) {
  .section {
    flex-direction: column;
    height: auto;
  }

  .left, .right {
    width: 100%;
  }
}
</style>
</head>

<body>

<section class="section">

  <!-- 右側內容 -->
  <div class="right">

    <div class="carousel" id="carousel">

      <a class="card" href="https://pr.ntnu.edu.tw/news/index.php?mode=data&id=22538&keywords=%E4%BD%95%E5%93%81%E5%84%80" target="_blank">

      </a>

      <a class="card" href="https://pr.ntnu.edu.tw/news/index.php?mode=data&id=22541&keywords=%E4%BD%95%E5%93%81%E5%84%80" target="_blank">

<script>
const carousel = document.getElementById("carousel");

/* 滾輪 → 左右 */
carousel.addEventListener("wheel", (e) => {
  e.preventDefault();
  carousel.scrollLeft += e.deltaY * 1.5;
});

/* 拖曳滑動 */
let isDown = false;
let startX;
let scrollLeft;

carousel.addEventListener("mousedown", (e) => {
  isDown = true;
  startX = e.pageX - carousel.offsetLeft;
  scrollLeft = carousel.scrollLeft;
});

carousel.addEventListener("mouseleave", () => isDown = false);
carousel.addEventListener("mouseup", () => isDown = false);

carousel.addEventListener("mousemove", (e) => {
  if (!isDown) return;
  e.preventDefault();

  const x = e.pageX - carousel.offsetLeft;
  const walk = (x - startX) * 1.5;
  carousel.scrollLeft = scrollLeft - walk;
});
</script>

</body>
</html>
