<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>Monadex 廣告｜Peggy</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #fff;
}

/* ===== HERO SECTION（文字＋背景）===== */
.section {
  position: relative;
  height: 120vh;
  overflow: hidden;
}

/* 背景圖片 */
.background-image {
  position: absolute;
  inset: 0;
  background-image: url("background.jpg");
  background-size: cover;
  background-position: center;
  z-index: 1;
}

/* 漸淡遮罩 */
.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.7) 0%,
    rgba(0,0,0,0.5) 40%,
    rgba(0,0,0,0.3) 70%,
    rgba(255,255,255,0.9) 100%
  );
  z-index: 2;
}

/* 文字內容 */
.content {
  position: relative;
  z-index: 3;
  color: white;
  max-width: 800px;
  padding: 100px 80px;
}

.title {
  font-size: 36px;
  font-weight: bold;
  margin-bottom: 10px;
  border-bottom: 2px solid white;
  display: inline-block;
  padding-bottom: 5px;
}

.subtitle {
  margin-top: 10px;
  font-size: 20px;
  line-height: 1.6;
}

/* ===== 展開內容 ===== */
.more-btn {
  margin-top: 20px;
  cursor: pointer;
  font-size: 18px;
}

.more-content {
  display: none;
  margin-top: 20px;
  line-height: 1.8;
  background: rgba(0,0,0,0.5);
  padding: 20px;
  border-radius: 10px;
}

/* ===== VIDEO ===== */
.video-section {
  padding: 80px;
}

.video-container {
  width: 100%;
  max-width: 1000px;
  margin: auto;
}

iframe {
  width: 100%;
  height: 550px;
  border: none;
  border-radius: 10px;
}

/* ===== BACK BUTTON ===== */
.back {
  text-align: center;
  margin-top: 40px;
}

.back a {
  text-decoration: none;
  border: 1px solid black;
  padding: 10px 25px;
  border-radius: 25px;
  color: black;
  transition: 0.3s;
}

.back a:hover {
  background: black;
  color: white;
}
</style>
</head>

<body>

<!-- ===== HERO ===== -->
<div class="section">

  <div class="background-image"></div>
  <div class="overlay"></div>

  <div class="content">

    <div class="title">
      Monadex 廣告:<br>
      "You have always been beautiful<br>
      you just needed to see it for yourself"
    </div>

    <div class="subtitle">
      以內容策略與影像敘事，連結品牌與人
    </div>

    <div class="more-btn" onclick="toggleContent()">
      ＋ 介紹
    </div>

    <div class="more-content" id="moreContent">
      針對 18-25 歲的大學生用戶對拍貼機畫質與容貌焦慮的痛點，
      定調「展現內在光芒」的品牌核心訊息。<br><br>

      將數據擬人化為「Monabots」機器人腳本，
      透過 Jessie 的角色衝突，
      具象化呈現拍貼機的高品質影像拍攝技術。<br><br>

      成功將目標客群的痛點與企業想與客群溝通的觀點融合，
      轉化為具情感連結的敘事。
    </div>

  </div>

</div>

<!-- ===== VIDEO ===== -->
<div class="video-section">

  <div class="video-container">

    <iframe 
      src="https://drive.google.com/file/d/11N-LjkpoeMwNugpDEIoF83HIBr9MBnfa/preview"
      allow="autoplay">
    </iframe>

  </div>

  <div class="back">
    <a href="index.html">← 回到作品集</a>
  </div>

</div>

<!-- ===== SCRIPT ===== -->
<script>
function toggleContent() {
  const content = document.getElementById("moreContent");
  content.style.display = content.style.display === "block" ? "none" : "block";
}
</script>

</body>
</html>
