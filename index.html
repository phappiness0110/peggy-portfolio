<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>何品儀 Peggy｜作品集</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ===== TOP BAR ===== */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  text-align: center;
  padding: 15px 0;
  color: white;
  z-index: 10;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.top-bar.active {
  background: white;
  color: black;
}

.top-title {
  font-size: 18px;
  font-weight: bold;
}

.top-sub {
  font-size: 12px;
}

/* ===== HERO ===== */
.hero {
  height: 120vh;
  background-image: url("hero.jpg");
  background-size: cover;
  background-position: 30% 60%;
  position: relative;
}

/* 漸淡 */
.hero::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 300px;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0) 0%,
    rgba(255,255,255,0.2) 40%,
    rgba(255,255,255,0.6) 70%,
    #fff 100%
  );
}

/* 遮罩 */
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

/* ===== 內容定位（🔥重點）===== */
.hero-content {
  position: absolute;
  top: 55%;              /* ← 控制上下位置 */
  left: 80px;
  transform: translateY(-50%); /* 垂直置中修正 */

  color: white;
  max-width: 600px;
}

/* 標題 */
.hero-title {
  font-size: 42px;
  font-weight: 600;
  line-height: 1.4;
}

/* slogan */
.hero-sub {
  margin-top: 16px;
  font-size: 18px;
  opacity: 0.9;
}

/* 按鈕 */
.hero-btn {
  margin-top: 20px;
  display: inline-block;
  padding: 10px 22px;
  border: 1px solid white;
  border-radius: 25px;
  color: white;
  text-decoration: none;
  transition: 0.3s;
}

.hero-btn:hover {
  background: white;
  color: black;
}

/* ===== WORKS ===== */
.container {
  width: 90%;
  max-width: 1100px;
  margin: -120px auto 0;
  padding: 80px 0;
  position: relative;
  z-index: 2;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.block {
  background: white;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
  border: 1px solid #eee;
}

.block:hover {
  transform: translateY(-6px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.logo-box {
  width: 80px;
  height: 80px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-box img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain;
}

.number {
  font-size: 28px;
  font-weight: bold;
}

.title {
  font-size: 14px;
  color: #444;
}

a {
  text-decoration: none;
  color: inherit;
}
</style>
</head>

<body>

<div class="top-bar" id="topBar">
  <div class="top-title">何品儀 Peggy</div>
  <div class="top-sub">歡迎來到我的創意天地</div>
</div>

<div class="hero">

  <div class="hero-content">

    <div class="hero-title">
      在 0 與 1 之間，<br>
      我選擇用創意填補實踐的悸動
    </div>

    <div class="hero-sub">
      以內容策略與影像敘事，連結品牌與人
    </div>

    <a href="mailto:phappiness0110@gmail.com" class="hero-btn">
      聯絡資訊
    </a>

  </div>

</div>

<div class="container">

<div class="grid">

  <a href="monadex.html">
    <div class="block">
      <div class="logo-box">
        <img src="monadex.jpg">
      </div>
      <div class="title">拍貼機公司合作廣告專案</div>
    </div>
  </a>

  <div class="block">
    <div class="number">12,000+</div>
    <div class="title">師大新聞曝光</div>
  </div>

  <div class="block">
    <div class="number">25+</div>
    <div class="title">學生加入（Orion）</div>
  </div>

  <div class="block">
    <div class="number">200+</div>
    <div class="title">東亞之夜活動</div>
  </div>

  <div class="block">
    <div class="logo-box">
      <img src="toastmasters.jpg">
    </div>
    <div class="title">社團短影音</div>
  </div>

  <div class="block">
    <div class="number">1,000+</div>
    <div class="title">學系介紹影片</div>
  </div>

  <div class="block">
    <div class="number">3場</div>
    <div class="title">講座分享</div>
  </div>

  <div class="block">
    <div class="number">2部</div>
    <div class="title">個人短影音</div>
  </div>

</div>

</div>

<script>
const topBar = document.getElementById("topBar");

window.addEventListener("scroll", () => {
  if (window.scrollY > 50) {
    topBar.classList.add("active");
  } else {
    topBar.classList.remove("active");
  }
});
</script>

</body>
</html>
