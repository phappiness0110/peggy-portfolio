<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>何品儀 Peggy｜作品集</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* ===== TOP BAR ===== */
.top-bar {
  position: fixed;
  top: 0;
  width: 100%;
  height: 60px;
  z-index: 20;
  background: rgba(0,0,0,0.2);
  backdrop-filter: blur(6px);
  transition: 0.3s;
}

.top-bar.active {
  background: white;
  color: black;
}

.top-center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

.top-bar.active .top-center {
  color: black;
}

.top-title {
  font-size: 16px;
  font-weight: bold;
}

.top-sub {
  font-size: 12px;
}

.top-contact {
  position: absolute;
  right: 5%;
  top: 50%;
  transform: translateY(-50%);
  border: 1px solid white;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 13px;
  text-decoration: none;
  color: white;
  transition: 0.3s;
}

.top-bar.active .top-contact {
  border: 1px solid black;
  color: black;
}

.top-contact:hover {
  background: white;
  color: black;
}

/* ===== HERO ===== */
.hero {
  height: 120vh;
  background-image: url("hero.jpg");
  background-size: cover;
  background-position: 30% 60%;
  position: relative;
}

.hero::after {
  content: "";
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 300px;
  background: linear-gradient(to bottom, rgba(255,255,255,0) 0%, rgba(255,255,255,0.6) 70%, #fff 100%);
}

.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.35);
}

.hero::before,
.hero::after {
  pointer-events: none;
}

.hero-content {
  position: absolute;
  top: 55%;
  left: 80px;
  transform: translateY(-50%);
  color: white;
  max-width: 600px;
}

.hero-title {
  font-size: 42px;
  font-weight: 600;
}

.hero-sub {
  margin-top: 16px;
  font-size: 18px;
}

/* ===== WORKS ===== */
.container {
  width: 90%;
  max-width: 1100px;
  margin: -120px auto 0;
  padding: 80px 0;
  position: relative;
  z-index: 2;
}

.grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
}

.block {
  background: white;
  padding: 25px;
  border-radius: 12px;
  text-align: center;
  transition: 0.3s;
  border: 1px solid #eee;
}

.block:hover {
  transform: translateY(-6px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.1);
}

.logo-box {
  width: 80px;
  height: 80px;
  margin: 0 auto 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.logo-box img {
  max-width: 100%;
  max-height: 100%;
}

.number {
  font-size: 28px;
  font-weight: bold;
}

.title {
  font-size: 14px;
  color: #444;
}

a {
  text-decoration: none;
  color: inherit;
  display: block;
}

@media(max-width: 900px){
  .grid {
    grid-template-columns: repeat(2, 1fr);
  }
}
</style>
</head>

<body>

<div class="top-bar" id="topBar">
  <div class="top-center">
    <div class="top-title">何品儀 Peggy</div>
    <div class="top-sub">歡迎來到我的創意天地</div>
  </div>

  <a href="contact.html" class="top-contact">聯絡資訊</a>
</div>

<div class="hero">
  <div class="hero-content">
    <div class="hero-title">
      在 0 與 1 之間，<br>我選擇用創意填補實踐的悸動
    </div>
    <div class="hero-sub">
      以內容策略與影像敘事，連結品牌與人
    </div>
  </div>
</div>

<div class="container">
<div class="grid">

  <a href="monadex.html"><div class="block"><div class="logo-box"><img src="monadex.jpg"></div><div class="title">拍貼機公司合作廣告專案</div></div></a>

  <!-- ⭐ 加 data-target -->
  <a href="ntnu-news.html"><div class="block"><div class="number" data-target="12000">12000+</div><div class="title">師大新聞曝光</div></div></a>

  <a href="orion25.html"><div class="block"><div class="number" data-target="25">25+</div><div class="title">學生加入（Orion）</div></div></a>

  <a href="eastasian-night.html"><div class="block"><div class="number" data-target="200">200+</div><div class="title">東亞之夜活動</div></div></a>

  <a href="toastmasters.html"><div class="block"><div class="logo-box"><img src="toastmasters.jpg"></div><div class="title">社團短影音</div></div></a>

  <a href="department.html"><div class="block"><div class="number" data-target="1000">1000+</div><div class="title">學系介紹影片</div></div></a>

  <a href="speech.html"><div class="block"><div class="number" data-target="3">3+</div><div class="title">講座分享</div></div></a>

  <a href="personal-shorts.html"><div class="block"><div class="number" data-target="2">2+</div><div class="title">個人短影音</div></div></a>

</div>
</div>

<script>
/* TOP BAR */
const topBar = document.getElementById("topBar");
window.addEventListener("scroll", () => {
  topBar.classList.toggle("active", window.scrollY > 50);
});

/* ⭐ 數字 hover 動畫 */
document.querySelectorAll(".block").forEach(block => {
  block.addEventListener("mouseenter", () => {

    const counter = block.querySelector(".number");
    if (!counter) return;

    const target = parseInt(counter.dataset.target);
    if (!target) return;

    let current = 0;
    const increment = target / 30;

    function update() {
      current += increment;
      if (current < target) {
        counter.innerText = Math.ceil(current);
        requestAnimationFrame(update);
      } else {
        counter.innerText = target.toLocaleString() + "+";
      }
    }

    update();
  });
});
</script>

</body>
</html>
